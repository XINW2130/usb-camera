<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="88" y="168" width="336" height="224" rx="28" fill="none" stroke="white" stroke-width="18"/>
  <!-- Top bump -->
  <rect x="192" y="124" width="128" height="48" rx="16" fill="none" stroke="white" stroke-width="16"/>
  <!-- Lens outer -->
  <circle cx="256" cy="280" r="80" fill="none" stroke="white" stroke-width="14"/>
  <!-- Lens inner ring -->
  <circle cx="256" cy="280" r="52" fill="url(#lens)" stroke="white" stroke-width="6"/>
  <!-- Lens center -->
  <circle cx="256" cy="280" r="18" fill="white"/>
  <!-- Flash dot -->
  <circle cx="160" cy="196" r="10" fill="white" opacity="0.6"/>
</svg>
