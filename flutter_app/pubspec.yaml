name: usb_camera_monitor
description: USB 摄像头监控应用 - 支持拍照、录像及媒体管理
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera - use CameraX for better external USB camera support
  camera: ^0.11.1
  camera_android_camerax: ^0.6.10

  # UVC direct USB webcam access (bypasses Camera2)
  flutter_ffi_uvc: ^0.6.0

  # Media
  video_player: ^2.9.2

  # Image encoding (UVC frame -> JPG)
  image: ^4.0.0

  # File system
  path_provider: ^2.1.5
  path: ^1.9.0
  permission_handler: ^11.3.1

  # UI
  intl: ^0.19.0

  # State
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.0
  media_store_plus: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  adaptive_icon_background: "#6C5CE7"
  adaptive_icon_foreground: "assets/icons/icon.png"
